# ============================================================
# pubspec.win7.yaml — Kelivo dependency overrides for Win7
# ============================================================
# Use with: flutter pub get --pubspec pubspec.win7.yaml
# Or manually merge into pubspec.yaml's dependency_overrides section.
#
# These overrides handle Win7-specific compatibility:
#   1. flutter_local_notifications: remove WinRT toast channel
#   2. webview_*: remove WebView2 dependencies
#   3. audioplayers: force non-WinRT backend on Windows
#   4. share_plus: fallback for no WinRT on Win7
#
# Overlays that delete dependencies entirely (bitsdojo_window, desktop_drop)
# should be handled by editing pubspec.yaml directly, as they are unused.

dependency_overrides:
  # --- flutter_local_notifications 17 ---
  # Windows toast notifications require Win10 1809+.
  # Win7 fallback: use tray_manager bubble notifications instead.
  # This override strips the Windows toast channel from the plugin.
  flutter_local_notifications:
    git:
      url: https://github.com/kelivo-win7/flutter_local_notifications.git
      ref: win7-compat
      path: flutter_local_notifications

  # --- webview_windows ---
  # WebView2 dropped Win7 support in Jan 2023.
  # Win7: disable webview entirely. The app should gracefully degrade
  # its web-based rendering (e.g., Mermaid diagrams) to pre-rendered.
  webview_windows:
    git:
      url: https://github.com/kelivo-win7/webview_windows.git
      ref: win7-stub
      path: src/webview_windows

  # --- share_plus 11 ---
  # share_plus Windows impl uses DataPackage (WinRT, Win8+).
  # Win7 fallback: use ShellExecuteW to open file location.
  share_plus:
    git:
      url: https://github.com/kelivo-win7/share_plus.git
      ref: win7-compat
      path: packages/share_plus/share_plus

  # --- audioplayers 6 ---
  # audioplayers Windows uses MediaPlayer (WinRT).
  # Win7 fallback: force SoundPlayer backend.
  audioplayers:
    git:
      url: https://github.com/kelivo-win7/audioplayers.git
      ref: win7-compat
      path: packages/audioplayers/audioplayers
