# ============================================================ # pubspec.win7.yaml 鈥?Kelivo dependency overrides for Win7 # ============================================================ # Use with: flutter pub get --pubspec pubspec.win7.yaml # Or manually merge into pubspec.yaml's dependency_overrides section. # # These overrides handle Win7-specific compatibility: #   1. flutter_local_notifications: remove WinRT toast channel #   2. webview_*: remove WebView2 dependencies #   3. audioplayers: force non-WinRT backend on Windows #   4. share_plus: fallback for no WinRT on Win7 # # Overlays that delete dependencies entirely (bitsdojo_window, desktop_drop) # should be handled by editing pubspec.yaml directly, as they are unused.  # ============================================================ # pubspec.win7.yaml 鈥?Kelivo dependency overrides for Win7 # ============================================================ # Use with: flutter pub get --pubspec pubspec.win7.yaml # Or manually merge into pubspec.yaml's dependency_overrides section. # # These overrides handle Win7-specific compatibility. # NOTE: The referenced forks under github.com/kelivo-win7/ need to # be created before this file can be used. See: #   https://github.com/kelivo-win7/kelivo-win7 # # Steps to create each fork: #   1. Fork the upstream package to github.com/kelivo-win7/<repo> #   2. Apply the Win7 compatibility patch #   3. Push to the ref branch listed below # # Overlays that delete unused dependencies entirely (bitsdojo_window, # desktop_drop) are handled by CI (pubspec regex removal).  dependency_overrides:   flutter_local_notifications:     git:       url: https://github.com/kelivo-win7/flutter_local_notifications.git       ref: win7-compat       path: flutter_local_notifications    webview_windows:     git:       url: https://github.com/kelivo-win7/webview_windows.git       ref: win7-stub       path: src/webview_windows    share_plus:     git:       url: https://github.com/kelivo-win7/share_plus.git       ref: win7-compat       path: packages/share_plus/share_plus    audioplayers:     git:       url: https://github.com/kelivo-win7/audioplayers.git       ref: win7-compat       path: packages/audioplayers/audioplayers