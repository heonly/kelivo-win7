# =====================================================
# Flutter Engine Windows x64 Release (Win7-compatible)
# =====================================================
# Builds a patched Flutter 3.44.1 engine with Win7 support.
# Based on rustdesk/engine CI workflow pattern.
#
# Triggers:
#   - Push to engine_patches/ or this file
#   - Manual workflow_dispatch
#   - Weekly rebuild (Mon 03:00 UTC)
#
# Runner requirements:
#   windows-2022; >=16GB RAM; ~80GB free disk
# =====================================================

name: flutter-engine-win7-x64

on:
  workflow_dispatch:
    inputs:
      kelivo_ref:
        description: "Kelivo commit/ref to build"
        required: true
        default: "c8c9ff37"
  push:
    paths:
      - "engine_patches/**"
      - "windows_overrides/**"
      - "dart_overrides/**"
      - ".github/workflows/flutter-engine-windows-x64-release-build.yml"
  schedule:
    - cron: "0 3 * * 1"

env:
  KELIVO_REF: ${{ github.event.inputs.kelivo_ref || 'c8c9ff37' }}
  DEPOT_TOOLS_PATH: C:\depot_tools
  ENGINE_SRC: C:\engine\src
  ENGINE_COMMIT: c416acfeb8126e097f758c664aaa3da929e27da0
  ARTIFACT_NAME: flutter-engine-win7-x64
  DEPOT_TOOLS_WIN_TOOLCHAIN: "0"

jobs:
  build-engine:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:
      - name: Checkout kelivo-win7 config
        uses: actions/checkout@v4
        with:
          path: kelivo-win7

      - name: Install depot_tools
        run: |
          git clone --depth 1 https://chromium.googlesource.com/chromium/tools/depot_tools.git "$env:DEPOT_TOOLS_PATH"
          echo "$env:DEPOT_TOOLS_PATH" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Fetch Flutter engine sources
        run: |
          mkdir C:\engine -Force
          cd C:\engine
          # fetch --no-history --nohooks flutter (takes ~15 min)
          fetch --no-history --nohooks flutter
          cd src\flutter
          # Unshallow to access older commits, then checkout the 3.44.1 engine commit
          git fetch --unshallow origin 2>$null; git fetch origin
          git checkout "$env:ENGINE_COMMIT"
          cd ..
          # gclient sync will fetch Dart SDK at the pinned version via DEPS
          gclient sync --with_branch_heads --with_tags -D --jobs=4
          gclient runhooks
        shell: pwsh
        timeout-minutes: 90

      - name: Apply Win7 compatibility patches
        run: |
          # Use the checked-out patch files
          python kelivo-win7/tools/apply_patches.py --engine-dir C:\engine\src
        shell: cmd

      - name: Configure GN (release, Impeller OFF, ANGLE)
        run: |
          cd C:\engine\src\flutter
          flutter tools\gn `
            --runtime-mode release `
            --target-os windows `
            --windows-cpu x64 `
            --no-enable-impeller `
            --no-lto `
            --no-goma
        shell: pwsh

      - name: Build flutter_windows.dll + flutter_exe
        run: |
          cd C:\engine\src\flutter
          ninja -C out\windows_release_x64 flutter_windows.dll flutter_exe
        shell: cmd
        timeout-minutes: 120

      - name: Sanity check — build a smoke test Flutter app
        run: |
          flutter create --platforms=windows ci_smoke
          cd ci_smoke

          # Point to local engine
          flutter config --enable-windows-desktop
          flutter config --local-engine-src-path C:\engine\src
          flutter config --local-engine windows_release_x64

          flutter build windows --release
          echo "=== Sanity check: run --version ==="
          .\build\windows\runner\Release\ci_smoke.exe --version
        shell: pwsh
        timeout-minutes: 30

      # ===== Kelivo Build =====
      - name: Clone Kelivo source
        run: |
          git clone https://github.com/Chevey339/kelivo.git C:\kelivo
          cd C:\kelivo
          git checkout "$env:KELIVO_REF"
        shell: cmd
        timeout-minutes: 10

      - name: Apply Kelivo Win7 overrides
        run: |
          # windows runner overrides
          copy /Y kelivo-win7\windows_overrides\runner.exe.manifest C:\kelivo\windows\runner\
          copy /Y kelivo-win7\windows_overrides\main.cpp C:\kelivo\windows\runner\
          copy /Y kelivo-win7\windows_overrides\utils.h C:\kelivo\windows\runner\
          copy /Y kelivo-win7\windows_overrides\utils.cc C:\kelivo\windows\runner\

          # dependency overrides
          copy /Y kelivo-win7\dart_overrides\pubspec.win7.yaml C:\kelivo\pubspec.win7.yaml
        shell: cmd

      - name: Remove unused deps from Kelivo pubspec
        run: |
          cd C:\kelivo
          powershell -Command "(Get-Content pubspec.yaml) -replace '^\s+bitsdojo_window:.*\n','' -replace '^\s+desktop_drop:.*\n','' | Set-Content pubspec.yaml"
        shell: cmd

      - name: Flutter pub get (Kelivo)
        run: |
          cd C:\kelivo
          flutter pub get
        shell: cmd
        timeout-minutes: 10

      - name: Build Kelivo Windows release
        run: |
          cd C:\kelivo
          flutter build windows --release
        shell: cmd
        timeout-minutes: 60

      # ===== Packaging =====
      - name: Package complete Win7 release
        run: |
          powershell -ExecutionPolicy Bypass -File kelivo-win7\release\scripts\package-win7.ps1 `
            -BuildDir C:\kelivo\build\windows\runner\Release `
            -Version $env:FLUTTER_REF-win7-${{ github.sha }} `
            -OutDir C:\release `
            -NoZip
        shell: pwsh

      - name: Upload full Win7 release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kelivo-win7-x64-${{ env.FLUTTER_REF }}
          path: |
            C:\release\kelivo-win7-x64-v${{ env.FLUTTER_REF }}-win7-*/
          retention-days: 30

      - name: Upload engine DLL (standalone)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}-${{ env.FLUTTER_REF }}-${{ github.sha }}
          path: |
            C:\engine\src\out\windows_release_x64\flutter_windows.dll
            C:\engine\src\out\windows_release_x64\icudtl.dat
          retention-days: 30

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            C:\engine\src\out\windows_release_x64\**\*.log
            C:\engine\src\flutter\out\windows_release_x64\**\*.ninja_log
            C:\kelivo\build\windows\**\*.log
          retention-days: 7
